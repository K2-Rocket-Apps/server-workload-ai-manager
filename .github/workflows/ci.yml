name: CI

on:
  push:
    branches: [main, develop, qa]
  pull_request:
    branches: [main, develop, qa]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build
    runs-on: k2-arc-linux
    timeout-minutes: 20
    env:
      npm_config_cache: ~/.npm
    steps:
      - uses: actions/checkout@v4
      - run: node -v && npm -v
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm -v
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

  lint:
    name: lint
    runs-on: k2-arc-linux
    timeout-minutes: 15
    env:
      npm_config_cache: ~/.npm
    steps:
      - uses: actions/checkout@v4
      - run: node -v && npm -v
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  security:
    name: security
    runs-on: k2-arc-linux
    timeout-minutes: 15
    env:
      npm_config_cache: ~/.npm
    steps:
      - uses: actions/checkout@v4
      - run: node -v && npm -v
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: pnpm audit
        run: pnpm audit --audit-level=high || true
