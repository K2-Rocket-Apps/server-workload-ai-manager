name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: k2-arc-linux
    timeout-minutes: 20
    env:
      npm_config_cache: ~/.npm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Node toolchain
        run: node -v && npm -v

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Confirm pnpm
        run: pnpm -v

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (typecheck via project references)
        run: pnpm build

      - name: Test
        run: pnpm test
